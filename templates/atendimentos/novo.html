{% extends "base.html" %}
{% block title %}Novo Atendimento{% endblock %}
{% block content %}
<h1>Novo Atendimento</h1>
<p style="font-size: 13px; color: #555">
  O status financeiro é consultado em tempo real no sistema do Financeiro via REST.
</p>
<form method="post">
  <fieldset>
    <legend>Paciente</legend>
    <label>CPF
      <input name="cpf" id="cpf" placeholder="00000000000" required maxlength="14"
             oninput="buscarPaciente(this.value)">
    </label>
    <div id="info-paciente" style="margin-top: 6px; font-size: 13px; color: #555"></div>
  </fieldset>
  <fieldset>
    <legend>Atendimento</legend>
    <label>Tipo
      <select name="tipo" required>
        <option value="CONSULTA">Consulta</option>
        <option value="RETORNO">Retorno</option>
        <option value="INTERNACAO">Internação</option>
        <option value="EMERGENCIA">Emergência</option>
      </select>
    </label>
    <label>CRM do médico <input name="crm" maxlength="15"></label>
    <label>Convênio <input name="convenio" maxlength="60"></label>
    <label>Carteirinha <input name="carteirinha" maxlength="30"></label>
  </fieldset>
  <button type="submit">Abrir atendimento</button>
  <a href="/atendimentos" class="btn" style="margin-left: 10px">Cancelar</a>
</form>
<script>
function buscarPaciente(val) {
  const cpf = val.replace(/\D/g, '');
  const el  = document.getElementById('info-paciente');
  if (cpf.length !== 11) { el.innerHTML = ''; return; }
  el.innerHTML = 'Consultando...';
  fetch('/api/paciente-local/' + cpf)
    .then(r => r.json())
    .then(d => {
      if (!d.encontrado) {
        el.innerHTML = '<span style="color: red">Paciente não encontrado.</span>';
        return;
      }
      const sf     = d.status_financeiro;
      const cor    = sf === 'BLOQUEADO' ? 'red' : sf === 'PENDENTE' ? 'orange' : 'green';
      const online = d.financeiro_online ? '🟢 online' : '🔴 offline (dados locais)';
      el.innerHTML = '<strong>' + d.nome + '</strong> &nbsp;|&nbsp; '
                   + 'Situação financeira: <span style="color:' + cor + '">' + sf + '</span>'
                   + ' &nbsp;|&nbsp; Financeiro: ' + online;
    });
}
</script>
{% endblock %}
